<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Base sphere: dark navy edges, medium blue body -->
    <radialGradient id="base" cx="50%" cy="62%" r="56%">
      <stop offset="0%"   stop-color="#2244cc"/>
      <stop offset="50%"  stop-color="#112299"/>
      <stop offset="100%" stop-color="#040c3a"/>
    </radialGradient>
    <!-- Specular highlight upper-left -->
    <radialGradient id="spec" cx="40%" cy="28%" r="34%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#aaccff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aaccff" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom diffuse glow -->
    <radialGradient id="glow" cx="54%" cy="80%" r="32%">
      <stop offset="0%"   stop-color="#55aaff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#55aaff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="15.5" fill="url(#base)"/>
  <circle cx="16" cy="16" r="15.5" fill="url(#spec)"/>
  <circle cx="16" cy="16" r="15.5" fill="url(#glow)"/>
</svg>
